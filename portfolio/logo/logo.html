<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Project</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f2027;
  color: white;
}

h1 {
  text-align: center;
  padding: 30px;
  font-size: 28px;
  letter-spacing: 1px;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px; /* ✅ REAL GAP */
  padding: 30px;
}

/* CARD (IMPORTANT FIX) */
.card {
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  transition: 0.3s;
  cursor: pointer;
}

/* HOVER */
.card:hover {
  transform: translateY(-6px) scale(1.03);
}

/* IMAGE */
.card img {
  width: 100%;
  display: block;
}

/* LIGHTBOX */
#lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

#close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  cursor: pointer;
}

#prev, #next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 50px;
  cursor: pointer;
  padding: 20px;
}

#prev { left: 20px; }
#next { right: 20px; }

/* MOBILE */
@media (max-width: 600px) {
  h1 {
    font-size: 22px;
  }
  #prev, #next {
    font-size: 30px;
    padding: 10px;
  }
}
</style>
</head>

<body>

<h1>Logo Project</h1>

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="close">&times;</span>
  <span id="prev">&#10094;</span>
  <img id="lightbox-img">
  <span id="next">&#10095;</span>
</div>

<script>
const USER = "Tanay0107";
const REPO = "Tanay0107.github.io";
const FOLDER = "portfolio/logo";

// YOUR FILES
const imageFiles = [
  "anti raggingV1-01.jpg",
  "anti raggingV1-02.jpg",
  "anti raggingV1-03.jpg",
  "Club Convesasion-31.jpg",
  "Club Convesasion-30-30.jpg",
  "Club Convesasion-32.jpg",
  "CPL_logo_final-01.jpg"
];

let images = [];
let currentIndex = 0;

const gallery = document.getElementById("gallery");

imageFiles.forEach((file, index) => {

  const encodedFile = encodeURIComponent(file);
  const imageUrl = `https://raw.githubusercontent.com/${USER}/${REPO}/main/${FOLDER}/${encodedFile}`;

  images.push(imageUrl);

  // 🔥 CARD STRUCTURE
  const card = document.createElement("div");
  card.className = "card";

  const img = document.createElement("img");
  img.src = imageUrl;

  card.onclick = () => {
    currentIndex = index;
    openLightbox();
  };

  card.appendChild(img);
  gallery.appendChild(card);
});

/* LIGHTBOX */
function openLightbox() {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = images[currentIndex];
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

function nextImg() {
  currentIndex = (currentIndex + 1) % images.length;
  document.getElementById("lightbox-img").src = images[currentIndex];
}

function prevImg() {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  document.getElementById("lightbox-img").src = images[currentIndex];
}

/* CONTROLS */
document.getElementById("close").onclick = closeLightbox;
document.getElementById("next").onclick = nextImg;
document.getElementById("prev").onclick = prevImg;

/* KEYBOARD */
document.addEventListener("keydown", (e) => {
  const lightbox = document.getElementById("lightbox");
  if (lightbox.style.display === "flex") {
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") nextImg();
    if (e.key === "ArrowLeft") prevImg();
  }
});
</script>

</body>
</html>
