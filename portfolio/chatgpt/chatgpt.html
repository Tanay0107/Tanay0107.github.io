<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT Ad Campaign</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', system-ui, sans-serif;
  background: linear-gradient(120deg, #0f2027, #203a43);
  color: white;
  overflow-x: hidden;
}

h1 {
  text-align: center;
  padding: 25px;
  font-weight: 700;
  letter-spacing: 1px;
  background: linear-gradient(90deg, #26c9b2, #c8e86b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 30px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  cursor: pointer;
  object-fit: cover;
  height: 200px;
  transform: translateY(50px);
  opacity: 0;
  transition: transform 0.6s ease, opacity 0.6s ease;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

.gallery img.show {
  transform: translateY(0);
  opacity: 1;
}

.gallery img:hover {
  transform: scale(1.08) rotate(1deg);
  box-shadow: 0 15px 25px rgba(0,0,0,0.7);
  filter: brightness(1.1);
}

/* LIGHTBOX */
#lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

/* CLOSE BUTTON */
#close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  cursor: pointer;
  color: #c8e86b;
}

#close:hover {
  transform: scale(1.2);
}

/* PREVIOUS / NEXT ARROWS from second page */
#prev, #next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 50px;
  cursor: pointer;
  padding: 20px;
  color: #26C9B2;
}

#prev { left: 20px; }
#next { right: 20px; }

/* MOBILE */
@media (max-width: 600px) {
  #prev, #next {
    font-size: 35px;
    padding: 10px;
  }
  .gallery img { height: 150px; }
}
</style>
</head>

<body>

<h1>ChatGPT Ad Campaign</h1>

<div id="loading" class="loading">Loading images...</div>
<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="close">&times;</span>
  <span id="prev">&#10094;</span>
  <img id="lightbox-img">
  <span id="next">&#10095;</span>
</div>

<script>
const USER = "Tanay0107";
const REPO = "Tanay0107.github.io";
const FOLDER = "portfolio/chatgpt";

const imageFiles = [
  "CAHTGPT MAGZINE MOCK UP.jpg",
  "brocher design-01.jpg",
  "brocher design-02.jpg",
  "hording chat gpt-01.jpg",
  "information pannel (blog}.jpg",
  "netwon apple mag 3-01.jpg",
  "netwon apple mag 3-02.jpg",
  "netwon apple mag 3-03.jpg",
  "poster 3-01.jpg",
  "poster 3-02.jpg",
  "poster 3_Artboard 3.jpg",
  "poster mock up tanay.jpg",
  "press ad.-01.jpg",
  "press ad.-02.jpg",
  "press ad.-03.jpg"
];

let images = [];
let currentIndex = 0;
const gallery = document.getElementById("gallery");
const loading = document.getElementById("loading");
loading.style.display = "none";

// Add images to gallery with staggered animation
imageFiles.forEach((file, index) => {
  const encodedFile = encodeURIComponent(file);
  const imageUrl = `https://raw.githubusercontent.com/${USER}/${REPO}/main/${FOLDER}/${encodedFile}`;
  images.push(imageUrl);

  const img = document.createElement("img");
  img.src = imageUrl;
  img.onerror = () => console.error("Failed:", imageUrl);

  img.onclick = () => { currentIndex = index; openLightbox(); };
  gallery.appendChild(img);

  // Animate in with delay
  setTimeout(() => img.classList.add("show"), index * 100);
});

/* LIGHTBOX */
let startX = 0, endX = 0;

function openLightbox() {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = images[currentIndex];
}

function closeLightbox() { document.getElementById("lightbox").style.display = "none"; }

function nextImg() { currentIndex = (currentIndex + 1) % images.length; document.getElementById("lightbox-img").src = images[currentIndex]; }

function prevImg() { currentIndex = (currentIndex - 1 + images.length) % images.length; document.getElementById("lightbox-img").src = images[currentIndex]; }

document.getElementById("close").onclick = closeLightbox;
document.getElementById("next").onclick = nextImg;
document.getElementById("prev").onclick = prevImg;

/* KEYBOARD */
document.addEventListener("keydown", (e) => {
  const lightbox = document.getElementById("lightbox");
  if (lightbox.style.display === "flex") {
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") nextImg();
    if (e.key === "ArrowLeft") prevImg();
  }
});

/* TOUCH SWIPE */
lightbox.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; });
lightbox.addEventListener("touchend", (e) => { endX = e.changedTouches[0].clientX; handleSwipe(); });
function handleSwipe() { let diff = startX - endX; if (Math.abs(diff) > 50) diff > 0 ? nextImg() : prevImg(); }
</script>

</body>
</html>
