<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT Ad Campaign</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f2027;
  color: white;
}

h1 {
  text-align: center;
  padding: 25px;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 200px;
  gap: 15px;
  padding: 20px;
}

.gallery img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* FIRST 4 = PORTRAIT STYLE */
.gallery img.portrait {
  grid-row: span 2;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #aaa;
}

/* LIGHTBOX */
#lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

#close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  cursor: pointer;
}

#prev, #next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 50px;
  cursor: pointer;
  padding: 20px;
}

#prev { left: 20px; }
#next { right: 20px; }
</style>
</head>

<body>

<h1>ChatGPT Ad Campaign</h1>

<div id="loading" class="loading">Loading images...</div>
<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="close">&times;</span>
  <span id="prev">&#10094;</span>
  <img id="lightbox-img">
  <span id="next">&#10095;</span>
</div>

<script>
const USER = "Tanay0107";
const REPO = "Tanay0107.github.io";
const FOLDER = "portfolio/chatgpt";

let images = [];
let currentIndex = 0;

async function loadImages() {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`
    );

    const data = await res.json();
    const loading = document.getElementById("loading");
    const gallery = document.getElementById("gallery");

    loading.style.display = "none";

    const files = data.filter(file =>
      file.type === "file" && file.name.match(/\.(jpg|jpeg|png|webp)$/i)
    );

    // Load all images to detect orientation
    const imagePromises = files.map(file => {
      return new Promise(resolve => {
        const img = new Image();
        img.src = file.download_url;

        img.onload = () => {
          resolve({
            url: file.download_url,
            isPortrait: img.naturalHeight > img.naturalWidth
          });
        };
      });
    });

    const loadedImages = await Promise.all(imagePromises);

    // Separate portrait & landscape
    const portraits = loadedImages.filter(img => img.isPortrait);
    const landscapes = loadedImages.filter(img => !img.isPortrait);

    // Take first 4 portraits
    const selectedPortraits = portraits.slice(0, 4);

    // Combine final order
    const finalImages = [...selectedPortraits, ...landscapes];

    // Render
    finalImages.forEach((imgData, index) => {
      images.push(imgData.url);

      const img = document.createElement("img");
      img.src = imgData.url;

      if (index < 4) {
        img.classList.add("portrait");
      }

      img.onclick = () => {
        currentIndex = index;
        openLightbox();
      };

      gallery.appendChild(img);
    });

  } catch (err) {
    document.getElementById("loading").innerText = "Failed to load images";
    console.error(err);
  }
}

function openLightbox() {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = images[currentIndex];
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

function nextImg() {
  currentIndex = (currentIndex + 1) % images.length;
  document.getElementById("lightbox-img").src = images[currentIndex];
}

function prevImg() {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  document.getElementById("lightbox-img").src = images[currentIndex];
}

document.getElementById("close").onclick = closeLightbox;
document.getElementById("next").onclick = nextImg;
document.getElementById("prev").onclick = prevImg;

document.addEventListener("keydown", (e) => {
  const lightbox = document.getElementById("lightbox");
  if (lightbox.style.display === "flex") {
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") nextImg();
    if (e.key === "ArrowLeft") prevImg();
  }
});

loadImages();
</script>

</body>
</html>
